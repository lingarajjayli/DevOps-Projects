# =====================================================
# kind - Kubernetes in Docker Cluster Configuration
# =====================================================
# This file creates a local Kubernetes cluster in Docker
# Use with: kind create cluster --config=kind.yaml
# =====================================================
# =====================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 8080
        hostPort: 8080
        protocol: TCP
      - containerPort: 31000
        hostPort: 31000
        protocol: TCP
      - containerPort: 32000
        hostPort: 32000
        protocol: TCP
    - role: worker
    - role: worker
networking:
  apiServerAddress: "10.96.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "172.20.0.0/16"
# Load balancer for ingress
loadBalancerClass: ""
# Disable default LoadBalancer (we'll use NodePort)
patches:
  - patch: |
      - op: add
        path: /spec/loadBalancerClass
        value: ""
    op: replace
    path: /spec/networking/kubeProxyConfiguration/iptables/rules/batch-masquerade/all-iptables-rules
    value: false
