# =====================================================
# Kubernetes ServiceAccount for Application
# =====================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  labels:
    app: dptweb
---
# ResourceQuota for namespace (optional)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
spec:
  hard:
    pods: "20"
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
