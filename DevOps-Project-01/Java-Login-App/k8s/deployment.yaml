# =====================================================
# Kubernetes Deployment for Java Login App
# =====================================================
# This deployment runs the Spring Boot application
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dptweb
  labels:
    app: dptweb
    version: "1.0"
spec:
  replicas: 2  # Scale with 2 replicas for high availability
  selector:
    matchLabels:
      app: dptweb
  template:
    metadata:
      labels:
        app: dptweb
        version: "1.0"
    spec:
      serviceAccountName: app-service-account
      containers:
        - name: app
          image: your-registry.com/dptweb:1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
